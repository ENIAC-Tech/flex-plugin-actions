name: Publish FlexStudio Plugin

on:
  workflow_call:
    inputs:
      flexcli-package:
        description: "Argument to npm install -g (GitHub tarball URL or @eniac/flexcli@version)"
        type: string
        required: false
        default: "https://github.com/ENIAC-Tech/flexcli/tarball/refs/heads/v2"
      api-base-url:
        description: "FlexStudio API base URL or hostname (no trailing slash). Webhook: {base}/api/v1/plugins/webhook. May omit scheme (https assumed)."
        type: string
        required: false
        default: "https://api.enilinx.com"
    secrets:
      webhook-secret:
        description: "HMAC secret for notifying the FlexStudio marketplace server"
        required: true

jobs:
  # ── First-release gate (skip marketplace notify on first published non-draft release) ─
  release-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip_notify: ${{ steps.query.outputs.skip_notify }}
    steps:
      - name: Count prior published (non-draft) releases
        id: query
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          current_tag="${{ github.ref_name }}"
          api="${GITHUB_API_URL:-https://api.github.com}/repos/${{ github.repository }}/releases"
          page=1
          prior=0
          ok=1
          while true; do
            if ! chunk="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}?per_page=100&page=${page}")"; then
              ok=0
              break
            fi
            len="$(echo "$chunk" | jq 'length')"
            if [ "$len" -eq 0 ]; then
              break
            fi
            c="$(echo "$chunk" | jq --arg t "$current_tag" '[.[] | select(.draft == false and .tag_name != $t)] | length')"
            prior=$((prior + c))
            if [ "$len" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done
          echo "prior_published_release_count=${prior}" >> "$GITHUB_OUTPUT"
          if [ "$ok" -ne 1 ]; then
            echo "skip_notify=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not list releases from GitHub API; marketplace notify will run."
            exit 0
          fi
          if [ "$prior" -eq 0 ]; then
            echo "skip_notify=true" >> "$GITHUB_OUTPUT"
            echo "Skipping marketplace notify: no earlier published (non-draft) releases before this tag (first Actions submit)."
          else
            echo "skip_notify=false" >> "$GITHUB_OUTPUT"
            echo "Marketplace notify will run (prior_published_release_count=${prior})."
          fi

  # ── Detect manifest ──────────────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.read.outputs.native }}
      platforms: ${{ steps.read.outputs.platforms }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify package version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${RELEASE_TAG#v}"
          export RELEASE_TAG RELEASE_VERSION
          node <<'NODE'
          const fs = require('fs');
          const releaseTag = process.env.RELEASE_TAG;
          const releaseVersion = process.env.RELEASE_VERSION;
          const semverPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;
          if (!semverPattern.test(releaseVersion)) {
            console.error(`Release tag "${releaseTag}" is not a semver version tag.`);
            process.exit(1);
          }
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.version !== releaseVersion) {
            console.error(
              `Release tag "${releaseTag}" resolves to "${releaseVersion}", ` +
                `but package.json version is "${pkg.version}".`
            );
            console.error('Update package.json version or publish a matching release tag.');
            process.exit(1);
          }
          NODE

      - name: Read manifest
        id: read
        run: |
          NATIVE=$(node -e "const m=require('./manifest.json'); console.log(m.native === true ? 'true' : 'false')")
          PLATFORMS=$(node -e "
            const m=require('./manifest.json');
            const p = m.native ? (m.platforms || ['win32-x64','darwin-arm64','darwin-x64','linux-x64']) : ['universal'];
            console.log(JSON.stringify(p));
          ")
          echo "native=$NATIVE" >> "$GITHUB_OUTPUT"
          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"

  # ── Build (universal — non-native plugins) ───────────────────────────────────
  build-universal:
    needs: detect
    if: needs.detect.outputs.native == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install flexcli
        run: npm install -g "${{ inputs.flexcli-package }}"

      - name: Build
        run: npm run build

      - name: Pack
        run: flexcli plugin-v2 pack

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/*.flexplugin"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-universal
          path: "release/*.flexplugin"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "release/*.flexplugin"

  # ── Build (native — per-platform matrix) ────────────────────────────────────
  build-native:
    needs: detect
    if: needs.detect.outputs.native == 'true'
    strategy:
      matrix:
        include:
          - platform: win32-x64
            os: windows-latest
          - platform: darwin-arm64
            os: macos-latest
          - platform: darwin-x64
            os: macos-13
          - platform: linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install flexcli
        run: npm install -g "${{ inputs.flexcli-package }}"

      - name: Build
        run: npm run build

      - name: Pack
        run: flexcli plugin-v2 pack --platform ${{ matrix.platform }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/*.flexplugin"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.platform }}
          path: "release/*.flexplugin"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "release/*.flexplugin"

  # ── Notify marketplace server ────────────────────────────────────────────────
  notify:
    needs: [detect, build-universal, build-native, release-context]
    if: |
      always() &&
      needs.release-context.outputs.skip_notify != 'true' &&
      (needs.build-universal.result == 'success' || needs.build-universal.result == 'skipped') &&
      (needs.build-native.result == 'success' || needs.build-native.result == 'skipped') &&
      (needs.build-universal.result == 'success' || needs.build-native.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify marketplace
        env:
          WEBHOOK_SECRET: ${{ secrets.webhook-secret }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          DELIVERY_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          MARKETPLACE_API_BASE: ${{ inputs.api-base-url }}
        run: |
          API_BASE="${MARKETPLACE_API_BASE:-}"
          if [ -z "$API_BASE" ]; then
            API_BASE="https://api.enilinx.com"
          fi
          API_BASE="${API_BASE%/}"
          case "$API_BASE" in
            http://*|https://*) ;;
            *) API_BASE="https://${API_BASE}" ;;
          esac
          WEBHOOK_URL="${API_BASE}/api/v1/plugins/webhook"

          PAYLOAD=$(node -e "
            const crypto = require('crypto');
            const manifest = require('./manifest.json');
            const payload = JSON.stringify({
              repo_url: process.env.REPO_URL,
              tag: process.env.RELEASE_TAG,
              manifest_uuid: manifest.uuid,
              delivery_id: process.env.DELIVERY_ID,
              timestamp: Math.floor(Date.now() / 1000)
            });
            const sig = crypto
              .createHmac('sha256', process.env.WEBHOOK_SECRET)
              .update(payload)
              .digest('hex');
            console.log(JSON.stringify({ payload, sig }));
          ")
          BODY=$(echo "$PAYLOAD" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(d.payload)")
          SIG=$(echo "$PAYLOAD" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(d.sig)")

          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$BODY" \
            "$WEBHOOK_URL"
